name: Open Code Review

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths-ignore:
      - "docs/releases/**"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: open-code-review-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  review:
    name: Review PR diff
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    env:
      OCR_LLM_URL: https://api.deepseek.com/chat/completions
      OCR_LLM_MODEL: ${{ vars.OCR_LLM_MODEL || 'deepseek-v4-flash' }}
      OCR_USE_ANTHROPIC: "false"
      VOILY_OCR_BACKGROUND: |
        Voily is a macOS 14+ SwiftUI/AppKit dictation app. Review with these project constraints:
        - Do not use macOS 15/26-only APIs unless guarded by availability checks and fallbacks.
        - Do not introduce Combine.
        - ASR providers must go through the SpeechTranscriptionService abstraction.
        - System audio muting while recording must stay centralized in SystemMediaPlaybackService.
        - Text injection must use the Accessibility paste path, not synthetic keystrokes.
        - Fn/trigger-key monitoring must stay on the IOKit path, not NSEvent global monitors.

        Review discipline (mimic PR-Agent's focused review):
        - Focus only on code lines changed in this PR diff. Do not re-review unchanged code or speculate about code defined elsewhere.
        - Report at most 3 findings per review. If more issues exist, prioritize the most severe.
        - Only report issues you are confident about: real bugs, security vulnerabilities, data races, crashes, user-facing regressions, or clear violations of the project constraints above.
        - Do not report style, naming, formatting, minor optimizations, missing comments, or nitpicks.
        - Do not flag intentional design choices unless they introduce a clear defect.
        - Each finding must describe a concrete problem and a realistic trigger scenario. If you cannot, skip it.
        - After a finding is fixed, do not introduce new non-blocking suggestions for the same area just because the diff context changed.
        - Prefix every comment content with exactly one of: [BLOCKER] for blocking issues, [CRITICAL] for severe bugs/violations. Do not use [WARNING] or [SUGGESTION].

    steps:
      - name: Check DeepSeek secret
        id: deepseek
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          set -euo pipefail

          if [[ -z "${DEEPSEEK_API_KEY:-}" ]]; then
            {
              echo "configured=false"
              echo "reason=Repository secret DEEPSEEK_API_KEY is not configured."
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "configured=true" >> "$GITHUB_OUTPUT"

      - name: Skip review
        if: steps.deepseek.outputs.configured != 'true'
        run: |
          {
            echo "## Open Code Review"
            echo
            echo "Skipped: ${DEEPSEEK_SKIP_REASON:-Repository secret DEEPSEEK_API_KEY is not configured.}"
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          DEEPSEEK_SKIP_REASON: ${{ steps.deepseek.outputs.reason }}

      - name: Check out repository
        if: steps.deepseek.outputs.configured == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        if: steps.deepseek.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Open Code Review
        if: steps.deepseek.outputs.configured == 'true'
        run: npm install -g @alibaba-group/open-code-review@1.2.4

      - name: Run Open Code Review
        if: steps.deepseek.outputs.configured == 'true'
        env:
          OCR_LLM_TOKEN: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            base_ref="origin/${GITHUB_BASE_REF}"
            head_ref="HEAD"
            git fetch origin "${GITHUB_BASE_REF}:refs/remotes/origin/${GITHUB_BASE_REF}" --depth=1
          else
            base_ref="origin/main"
            head_ref="HEAD"
            git fetch origin "main:refs/remotes/origin/main" --depth=1
          fi

          ocr version
          ocr llm test
          ocr review \
            --audience agent \
            --concurrency 2 \
            --from "$base_ref" \
            --to "$head_ref" \
            --format json \
            --background "$VOILY_OCR_BACKGROUND" \
            > ocr-result.json

      - name: Summarize review
        if: steps.deepseek.outputs.configured == 'true'
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import json
          import os

          BLOCKER_TAG = "[BLOCKER]"
          CRITICAL_TAG = "[CRITICAL]"
          MAX_SUMMARY_FINDINGS = 10

          def severity_rank(comment):
              content = (comment.get("content") or "").upper()
              if BLOCKER_TAG in content:
                  return 0
              if CRITICAL_TAG in content:
                  return 1
              return 2

          with open("ocr-result.json", encoding="utf-8") as handle:
              result = json.load(handle)

          raw_comments = result.get("comments") or []
          warnings = result.get("warnings") or []

          # Keep only blocker/critical findings. If the model ignored the tagging
          # instruction, fall back to the raw list but cap it tightly so the
          # review does not explode with style nits.
          blocking = [c for c in raw_comments if severity_rank(c) <= 1]
          if blocking:
              comments = blocking
              model_tagged = True
          else:
              comments = raw_comments[:3]
              model_tagged = False

          comments.sort(key=severity_rank)
          comments = comments[:MAX_SUMMARY_FINDINGS]
          summary_path = os.environ["GITHUB_STEP_SUMMARY"]

          with open(summary_path, "a", encoding="utf-8") as summary:
              summary.write("## Open Code Review\n\n")
              summary.write(f"- Raw findings: {len(raw_comments)}\n")
              summary.write(f"- Blocking/critical shown: {len(comments)}\n")
              summary.write(f"- Warnings: {len(warnings)}\n")
              summary.write(f"- Model: `{os.environ.get('OCR_LLM_MODEL', '')}`\n")
              if not model_tagged and raw_comments:
                  summary.write("- Note: model did not tag severities; showing only the first 3 raw findings.\n")
              summary.write("\n")

              if comments:
                  summary.write("### Findings\n\n")
                  for comment in comments:
                      path = comment.get("path", "unknown")
                      line = comment.get("start_line") or comment.get("end_line") or 0
                      content = (comment.get("content") or "").strip().replace("\n", " ")
                      if len(content) > 260:
                          content = content[:257] + "..."
                      summary.write(f"- `{path}:{line}` {content}\n")
                  if len(blocking) > MAX_SUMMARY_FINDINGS:
                      summary.write(f"\nOnly the first {MAX_SUMMARY_FINDINGS} blocking/critical findings are shown. See `ocr-result` artifact for all output.\n")
              else:
                  summary.write("No blocking issues 🎉\n")
          PY

      - name: Post review comment
        if: steps.deepseek.outputs.configured == 'true' && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          python3 - <<'PY' > comment-body.md
          import json
          import os

          BLOCKER_TAG = "[BLOCKER]"
          CRITICAL_TAG = "[CRITICAL]"
          MAX_PR_FINDINGS = 5

          def severity_rank(comment):
              content = (comment.get("content") or "").upper()
              if BLOCKER_TAG in content:
                  return 0
              if CRITICAL_TAG in content:
                  return 1
              return 2

          with open("ocr-result.json", encoding="utf-8") as handle:
              result = json.load(handle)

          raw_comments = result.get("comments") or []
          warnings = result.get("warnings") or []
          model = os.environ.get("OCR_LLM_MODEL", "")

          blocking = [c for c in raw_comments if severity_rank(c) <= 1]
          if blocking:
              comments = blocking
              model_tagged = True
          else:
              comments = raw_comments[:3]
              model_tagged = False

          comments.sort(key=severity_rank)
          comments = comments[:MAX_PR_FINDINGS]

          lines = [
              "<!-- open-code-review -->",
              "## 🤖 Open Code Review — Blockers & Critical only",
              "",
              f"Model `{model}` · **{len(comments)}** blocking/critical findings",
              "",
          ]

          if not model_tagged and raw_comments:
              lines.append(
                  "_⚠️ The model did not tag severities as requested; showing only the first 3 raw findings. "
                  "Full output is available in the `ocr-result` artifact._"
              )
              lines.append("")

          if comments:
              for comment in comments:
                  path = comment.get("path", "unknown")
                  line = comment.get("start_line") or comment.get("end_line") or 0
                  content = " ".join((comment.get("content") or "").split())
                  if len(content) > 500:
                      content = content[:497] + "..."
                  lines.append(f"- **`{path}:{line}`** — {content}")
              if len(blocking) > MAX_PR_FINDINGS:
                  lines.append("")
                  lines.append(f"_Showing first {MAX_PR_FINDINGS} of {len(blocking)} blocking/critical findings. Full output in the `ocr-result` artifact._")
          else:
              lines.append("No blocking issues 🎉")

          print("\n".join(lines))
          PY

          # Upsert a single sticky comment so repeated pushes update in place.
          gh pr comment "$PR_NUMBER" --body-file comment-body.md --edit-last --create-if-none

      - name: Upload OCR result
        if: steps.deepseek.outputs.configured == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ocr-result
          path: ocr-result.json
          if-no-files-found: error
