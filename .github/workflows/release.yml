name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing semantic version tag to build, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  release:
    name: Build, notarize, and publish
    runs-on: [self-hosted, macOS, ARM64, voily-release]
    timeout-minutes: 90
    env:
      GH_TOKEN: ${{ github.token }}
      VOILY_NOTARY_PROFILE: ${{ vars.VOILY_NOTARY_PROFILE }}
      VOILY_RELEASE_KEYCHAIN: /Users/openclaw/Library/Keychains/voily-release.keychain-db
      VOILY_RELEASE_KEYCHAIN_PASSWORD: ${{ secrets.VOILY_RELEASE_KEYCHAIN_PASSWORD }}
      VOILY_SPARKLE_KEYCHAIN_ACCOUNT: ed25519
      VOILY_SPARKLE_KEYCHAIN_SERVICE: dev.voily.sparkle.ed25519-private-key
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

    steps:
      - name: Check out release tag
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Preflight runner
        run: |
          set -euo pipefail

          test -n "$VOILY_NOTARY_PROFILE"
          test -n "$VOILY_RELEASE_KEYCHAIN"
          test -n "$VOILY_RELEASE_KEYCHAIN_PASSWORD"

          security unlock-keychain -p "$VOILY_RELEASE_KEYCHAIN_PASSWORD" "$VOILY_RELEASE_KEYCHAIN"
          security list-keychains -d user -s "$VOILY_RELEASE_KEYCHAIN" "$HOME/Library/Keychains/login.keychain-db"

          sw_vers
          uname -m
          xcode-select -p
          xcodebuild -version
          xcodebuild -downloadComponent MetalToolchain
          xcodegen --version
          dmgbuild --help >/dev/null
          gh --version
          security find-identity -p codesigning -v "$VOILY_RELEASE_KEYCHAIN"
          xcrun notarytool history --keychain "$VOILY_RELEASE_KEYCHAIN" --keychain-profile "$VOILY_NOTARY_PROFILE"

      - name: Prepare Sparkle tools
        run: |
          set -euo pipefail

          shasum -a 256 Vendor/Sparkle/Sparkle-for-Swift-Package-Manager.zip | grep -q '^b83e37436774556ed055e0244b297ef2c790e0737393bf65bf495fcbba6eed65 '
          rm -rf /tmp/voily-sparkle
          unzip -q Vendor/Sparkle/Sparkle-for-Swift-Package-Manager.zip -d /tmp/voily-sparkle

          security set-generic-password-partition-list \
            -a "$VOILY_SPARKLE_KEYCHAIN_ACCOUNT" \
            -s "$VOILY_SPARKLE_KEYCHAIN_SERVICE" \
            -S apple-tool:,apple: \
            -k "$VOILY_RELEASE_KEYCHAIN_PASSWORD" \
            "$VOILY_RELEASE_KEYCHAIN"

          if ! security find-generic-password \
            -a "$VOILY_SPARKLE_KEYCHAIN_ACCOUNT" \
            -s "$VOILY_SPARKLE_KEYCHAIN_SERVICE" \
            -w "$VOILY_RELEASE_KEYCHAIN" >/dev/null; then
            printf 'Sparkle private key was not found in release keychain: %s\n' "$VOILY_RELEASE_KEYCHAIN" >&2
            printf 'Import it as a generic password with account "%s" and service "%s".\n' "$VOILY_SPARKLE_KEYCHAIN_ACCOUNT" "$VOILY_SPARKLE_KEYCHAIN_SERVICE" >&2
            exit 1
          fi

      - name: Build signed release app
        run: |
          set -euo pipefail
          make clean-release
          make release

      - name: Validate tag and package DMG
        id: package
        run: |
          set -euo pipefail

          app_version="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' build/release/Voily.app/Contents/Info.plist)"
          app_build="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' build/release/Voily.app/Contents/Info.plist)"
          expected_tag="v${app_version}"
          semver_pattern='^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$'
          app_version_pattern='^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$'

          if [[ ! "$RELEASE_TAG" =~ $semver_pattern ]]; then
            printf 'Release tag %s is not a supported semantic version tag. Expected vMAJOR.MINOR.PATCH, for example v0.1.0.\n' "$RELEASE_TAG" >&2
            exit 1
          fi

          if [[ ! "$app_version" =~ $app_version_pattern ]]; then
            printf 'App version %s is not a supported semantic version. Expected MAJOR.MINOR.PATCH, for example 0.1.0.\n' "$app_version" >&2
            exit 1
          fi

          if [[ "$RELEASE_TAG" != "$expected_tag" ]]; then
            printf 'Release tag %s does not match app version %s. Expected %s.\n' "$RELEASE_TAG" "$app_version" "$expected_tag" >&2
            exit 1
          fi

          make package-dmg

          shopt -s nullglob
          artifacts=(build/release/artifacts/*.dmg)
          if [[ "${#artifacts[@]}" -ne 1 ]]; then
            printf 'Expected exactly one DMG artifact, found %s.\n' "${#artifacts[@]}" >&2
            exit 1
          fi

          artifact="${artifacts[0]}"
          {
            printf 'artifact=%s\n' "$artifact"
            printf 'app_version=%s\n' "$app_version"
            printf 'app_build=%s\n' "$app_build"
          } >> "$GITHUB_OUTPUT"

      - name: Notarize, staple, and verify
        run: |
          set -euo pipefail

          artifact="${{ steps.package.outputs.artifact }}"
          xcrun notarytool submit "$artifact" \
            --keychain "$VOILY_RELEASE_KEYCHAIN" \
            --keychain-profile "$VOILY_NOTARY_PROFILE" \
            --wait

          ARTIFACT="$artifact" make staple
          ARTIFACT="$artifact" make verify-release

      - name: Generate Sparkle appcast
        run: |
          set -euo pipefail

          release_notes_path="docs/releases/${RELEASE_TAG}.md"
          if [[ ! -f "$release_notes_path" ]]; then
            printf 'Release notes file was not found: %s\n' "$release_notes_path" >&2
            exit 1
          fi

          public_ed_key="$(/usr/libexec/PlistBuddy -c 'Print :SUPublicEDKey' build/release/Voily.app/Contents/Info.plist 2>/dev/null || true)"
          if [[ -z "$public_ed_key" || "$public_ed_key" =~ \$\( ]]; then
            printf 'SUPublicEDKey is missing or unresolved in release app Info.plist.\n' >&2
            exit 1
          fi

          artifact="${{ steps.package.outputs.artifact }}"
          cp "$release_notes_path" "${artifact%.*}.md"

          download_url_prefix="https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/"
          security find-generic-password \
            -a "$VOILY_SPARKLE_KEYCHAIN_ACCOUNT" \
            -s "$VOILY_SPARKLE_KEYCHAIN_SERVICE" \
            -w "$VOILY_RELEASE_KEYCHAIN" |
          /tmp/voily-sparkle/bin/generate_appcast \
            --download-url-prefix "$download_url_prefix" \
            --embed-release-notes \
            --ed-key-file - \
            build/release/artifacts

          test -f build/release/artifacts/appcast.xml
          python3 - <<'PY'
          import xml.etree.ElementTree as ET
          tree = ET.parse("build/release/artifacts/appcast.xml")
          item = tree.getroot().find("channel/item")
          if item is None:
              raise SystemExit("appcast.xml does not contain an item")
          description = item.findtext("description")
          if description is None or len(description.strip()) < 80:
              raise SystemExit("appcast item does not contain detailed release notes")
          PY
          grep -q 'sparkle:edSignature' build/release/artifacts/appcast.xml
          grep -q "$download_url_prefix" build/release/artifacts/appcast.xml

      - name: Publish GitHub release
        run: |
          set -euo pipefail

          artifact="${{ steps.package.outputs.artifact }}"
          title="Voily ${{ steps.package.outputs.app_version }}"
          release_notes_path="docs/releases/${RELEASE_TAG}.md"
          if [[ ! -f "$release_notes_path" ]]; then
            printf 'Release notes file was not found: %s\n' "$release_notes_path" >&2
            exit 1
          fi

          shopt -s nullglob
          assets=("$artifact" build/release/artifacts/appcast.xml build/release/artifacts/*.delta)

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "$title" \
              --notes-file "$release_notes_path"
            gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
          else
            gh release create "$RELEASE_TAG" "${assets[@]}" \
              --title "$title" \
              --notes-file "$release_notes_path" \
              --verify-tag
          fi
