name: Voily

options:
  bundleIdPrefix: dev.kieranzhang
  developmentLanguage: en
  deploymentTarget:
    macOS: "14.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CLANG_ENABLE_MODULES: YES
    CLANG_ENABLE_OBJC_WEAK: YES
    CLANG_WARN_BLOCK_CAPTURE_AUTORELEASING: YES
    CLANG_WARN_BOOL_CONVERSION: YES
    CLANG_WARN_COMMA: YES
    CLANG_WARN_CONSTANT_CONVERSION: YES
    CLANG_WARN_DEPRECATED_OBJC_IMPLEMENTATIONS: YES
    CLANG_WARN_EMPTY_BODY: YES
    CLANG_WARN_ENUM_CONVERSION: YES
    CLANG_WARN_INFINITE_RECURSION: YES
    CLANG_WARN_INT_CONVERSION: YES
    CLANG_WARN_NON_LITERAL_NULL_CONVERSION: YES
    CLANG_WARN_OBJC_IMPLICIT_RETAIN_SELF: YES
    CLANG_WARN_OBJC_LITERAL_CONVERSION: YES
    CLANG_WARN_QUOTED_INCLUDE_IN_FRAMEWORK_HEADER: YES
    CLANG_WARN_RANGE_LOOP_ANALYSIS: YES
    CLANG_WARN_STRICT_PROTOTYPES: YES
    CLANG_WARN_SUSPICIOUS_MOVE: YES
    CLANG_WARN_UNREACHABLE_CODE: YES
    CLANG_WARN__DUPLICATE_METHOD_MATCH: YES
    ENABLE_STRICT_OBJC_MSGSEND: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GCC_NO_COMMON_BLOCKS: YES
    GCC_WARN_64_TO_32_BIT_CONVERSION: YES
    GCC_WARN_ABOUT_RETURN_TYPE: YES
    GCC_WARN_UNDECLARED_SELECTOR: YES
    GCC_WARN_UNINITIALIZED_AUTOS: YES
    GCC_WARN_UNUSED_FUNCTION: YES
    GCC_WARN_UNUSED_VARIABLE: YES
    SDKROOT: macosx
    STRING_CATALOG_GENERATE_SYMBOLS: YES
    SWIFT_EMIT_LOC_STRINGS: YES
  configs:
    Debug:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
      DEBUG_INFORMATION_FORMAT: dwarf
      ENABLE_TESTABILITY: YES
      ONLY_ACTIVE_ARCH: YES
      COPY_PHASE_STRIP: NO
    Release:
      SWIFT_OPTIMIZATION_LEVEL: "-O"
      SWIFT_COMPILATION_MODE: wholemodule
      DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"
      COPY_PHASE_STRIP: NO

packages:
  Voily:
    path: .
  Sparkle:
    path: Vendor/Sparkle
  PermissionFlow:
    url: https://github.com/jaywcjlove/PermissionFlow.git
    from: 2.4.0

targets:
  Voily:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/VoilyApp
      - path: Resources/VoilyApp/Assets.xcassets
      - path: Resources/VoilyApp/en.lproj
      - path: Resources/VoilyApp/ja.lproj
      - path: Resources/VoilyApp/zh-Hans.lproj
      - path: Resources/VoilyApp/zh-Hant.lproj
      - path: Resources/VoilyApp/BrandIcons
        type: folder
    info:
      path: Resources/VoilyApp/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSMicrophoneUsageDescription: "Voily needs microphone access to record your voice when you press the trigger key and transcribe it into text."
        SUFeedURL: "https://github.com/BubblePtr/Voily/releases/latest/download/appcast.xml"
        SUPublicEDKey: "$(VOILY_SPARKLE_PUBLIC_ED_KEY)"
        SUEnableAutomaticChecks: false
    entitlements:
      path: Resources/VoilyApp/Voily.entitlements
      properties:
        com.apple.security.device.audio-input: true
    dependencies:
      - package: Voily
        product: VoilyCore
      - package: Sparkle
        product: Sparkle
      - package: PermissionFlow
        product: PermissionFlow
    settings:
      base:
        PRODUCT_NAME: Voily
        PRODUCT_BUNDLE_IDENTIFIER: dev.kieranzhang.voily
        MARKETING_VERSION: "0.1.4"
        CURRENT_PROJECT_VERSION: "4"
        VOILY_SPARKLE_PUBLIC_ED_KEY: "t+3T7R1L+52pqpiHjRjtd1QksVS6cjKlh5YK+pDhuPA="
        DEVELOPMENT_TEAM: 9KZ32XLVQW
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Resources/VoilyApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/VoilyApp/Voily.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        DEAD_CODE_STRIPPING: YES
        DEFINES_MODULE: YES
        ENABLE_MODULE_VERIFIER: YES
        MODULE_VERIFIER_SUPPORTED_LANGUAGE_STANDARDS: "gnu17 gnu++14"
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"
        TARGETED_DEVICE_FAMILY: ""
        ENABLE_APP_SANDBOX: NO
        ENABLE_HARDENED_RUNTIME: NO
      configs:
        Release:
          ENABLE_HARDENED_RUNTIME: YES

  VoilyTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Tests/VoilyTests
    dependencies:
      - target: Voily
      - package: Voily
        product: VoilyCore
    settings:
      base:
        PRODUCT_NAME: VoilyTests
        PRODUCT_BUNDLE_IDENTIFIER: dev.kieranzhang.voilyTests
        MARKETING_VERSION: "0.1.4"
        CURRENT_PROJECT_VERSION: "4"
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGNING_ALLOWED: YES
        CODE_SIGNING_REQUIRED: YES
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        DEAD_CODE_STRIPPING: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Voily.app/Contents/MacOS/Voily"
        TEST_TARGET_NAME: Voily
        BUNDLE_LOADER: "$(TEST_HOST)"
        SWIFT_EMIT_LOC_STRINGS: NO
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@loader_path/../Frameworks"
          - "@executable_path/../Frameworks"

schemes:
  Voily:
    build:
      targets:
        Voily: all
    run:
      executable: Voily
      config: Debug
    test:
      config: Debug
      targets:
        - VoilyTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
